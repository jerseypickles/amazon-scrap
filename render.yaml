services:
  # ── Backend (FastAPI) ──────────────────────────────────
  - type: web
    name: nichescout-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: SCRAPER_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: KEEPA_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

  # ── Frontend (Next.js) ─────────────────────────────────
  - type: web
    name: nichescout-web
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: BACKEND_URL
        sync: false
